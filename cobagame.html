<!DOCTYPE html>
<html>
<head>
    <title>Pong Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }

        .container {
            text-align: center;
        }

        h1 {
            color: #fff;
            margin-bottom: 20px;
            font-size: 2.5em;
        }

        .scoreboard {
            display: flex;
            justify-content: space-around;
            width: 800px;
            margin-bottom: 20px;
            color: #fff;
            font-size: 1.5em;
        }

        .score {
            flex: 1;
        }

        canvas {
            display: block;
            background: #000;
            border: 3px solid #fff;
            margin: 0 auto;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
        }

        .controls {
            color: #aaa;
            margin-top: 20px;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 PONG 🎮</h1>
        <div class="scoreboard">
            <div class="score">Player: <span id="playerScore">0</span></div>
            <div class="score">Computer: <span id="computerScore">0</span></div>
        </div>
        <canvas id="pong" width="800" height="400"></canvas>
        <div class="controls">
            <p>Player Controls: <strong>Mouse Y-position or Arrow Up/Down</strong></p>
            <p>Computer AI vs. Player</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('pong');
        const context = canvas.getContext('2d');
        const playerScoreDisplay = document.getElementById('playerScore');
        const computerScoreDisplay = document.getElementById('computerScore');

        // Paddle dimensions
        const paddleWidth = 10;
        const paddleHeight = 80;

        // Player paddle (left)
        const player = {
            x: 20,
            y: canvas.height / 2 - paddleHeight / 2,
            width: paddleWidth,
            height: paddleHeight,
            score: 0,
            speed: 6
        };

        // Computer paddle (right)
        const computer = {
            x: canvas.width - 20 - paddleWidth,
            y: canvas.height / 2 - paddleHeight / 2,
            width: paddleWidth,
            height: paddleHeight,
            score: 0,
            speed: 4
        };

        // Ball object
        const ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: 8,
            velocityX: 5,
            velocityY: 5
        };

        // Input handling
        const keys = {};
        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        document.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            player.y = e.clientY - rect.top - player.height / 2;
            
            // Keep paddle within canvas bounds
            if (player.y < 0) player.y = 0;
            if (player.y + player.height > canvas.height) {
                player.y = canvas.height - player.height;
            }
        });

        function updatePlayerPosition() {
            if (keys['ArrowUp'] && player.y > 0) {
                player.y -= player.speed;
            }
            if (keys['ArrowDown'] && player.y + player.height < canvas.height) {
                player.y += player.speed;
            }
        }

        function updateComputerAI() {
            const computerCenter = computer.y + computer.height / 2;
            const ballCenter = ball.y;

            if (computerCenter < ballCenter - 35) {
                if (computer.y + computer.height < canvas.height) {
                    computer.y += computer.speed;
                }
            } else if (computerCenter > ballCenter + 35) {
                if (computer.y > 0) {
                    computer.y -= computer.speed;
                }
            }
        }

        function updateBall() {
            // Move ball
            ball.x += ball.velocityX;
            ball.y += ball.velocityY;

            // Top and bottom wall collision
            if (ball.y - ball.radius < 0 || ball.y + ball.radius > canvas.height) {
                ball.velocityY = -ball.velocityY;
                
                // Clamp ball position to prevent it from going too far out of bounds
                if (ball.y - ball.radius < 0) {
                    ball.y = ball.radius;
                }
                if (ball.y + ball.radius > canvas.height) {
                    ball.y = canvas.height - ball.radius;
                }
            }

            // Player paddle collision
            if (
                ball.x - ball.radius < player.x + player.width &&
                ball.y > player.y &&
                ball.y < player.y + player.height &&
                ball.velocityX < 0
            ) {
                ball.velocityX = -ball.velocityX;
                ball.x = player.x + player.width + ball.radius;

                // Add spin based on where ball hits paddle
                const deltaY = ball.y - (player.y + player.height / 2);
                ball.velocityY = (deltaY / (player.height / 2)) * 5;
            }

            // Computer paddle collision
            if (
                ball.x + ball.radius > computer.x &&
                ball.y > computer.y &&
                ball.y < computer.y + computer.height &&
                ball.velocityX > 0
            ) {
                ball.velocityX = -ball.velocityX;
                ball.x = computer.x - ball.radius;

                // Add spin based on where ball hits paddle
                const deltaY = ball.y - (computer.y + computer.height / 2);
                ball.velocityY = (deltaY / (computer.height / 2)) * 5;
            }

            // Score points and reset ball
            if (ball.x - ball.radius < 0) {
                computer.score++;
                computerScoreDisplay.textContent = computer.score;
                resetBall();
            }

            if (ball.x + ball.radius > canvas.width) {
                player.score++;
                playerScoreDisplay.textContent = player.score;
                resetBall();
            }
        }

        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.velocityX = (Math.random() > 0.5 ? 1 : -1) * 5;
            ball.velocityY = (Math.random() - 0.5) * 5;
        }

        function drawPaddle(paddle, color) {
            context.fillStyle = color;
            context.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);
        }

        function drawBall() {
            context.fillStyle = '#00ff00';
            context.beginPath();
            context.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            context.closePath();
            context.fill();
        }

        function drawCenterLine() {
            context.strokeStyle = '#444';
            context.setLineDash([10, 10]);
            context.beginPath();
            context.moveTo(canvas.width / 2, 0);
            context.lineTo(canvas.width / 2, canvas.height);
            context.stroke();
            context.setLineDash([]);
        }

        function draw() {
            // Clear canvas
            context.fillStyle = '#000';
            context.fillRect(0, 0, canvas.width, canvas.height);

            // Draw center line
            drawCenterLine();

            // Draw paddles
            drawPaddle(player, '#0099ff');
            drawPaddle(computer, '#ff0066');

            // Draw ball
            drawBall();
        }

        function gameLoop() {
            updatePlayerPosition();
            updateComputerAI();
            updateBall();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Start the game
        gameLoop();
    </script>
</body>
</html>
